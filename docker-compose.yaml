services:
  # 1. The Core Application & Vite Server Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio-app
    container_name: portfolio_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - portfolio_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 2. High-Performance Nginx (Configured for standard web + WebSocket Upgrades)
  web:
    image: nginx:alpine
    container_name: portfolio_web
    restart: unless-stopped
    ports:
      - "80:80"
      - "5173:5173" # Vite Dev Server Port
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - portfolio_network
    depends_on:
      - app

  # 3. Dedicated Laravel Reverb WebSocket Worker Container
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_reverb
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8080:8080" # Reverb WebSocket Port
    volumes:
      - .:/var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - portfolio_network
    depends_on:
      - app

  # 4. Background Queue Worker (Handles asynchronous timeline streams/broadcasts)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    networks:
      - portfolio_network
    depends_on:
      - redis

  # 5. Database Container (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-portfolio}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${DB_DATABASE:-portfolio}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfolio_network

  # 6. Cache & Broadcast Engine (Redis)
  redis:
    image: redis:alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
